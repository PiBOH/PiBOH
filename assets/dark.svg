<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 1180 610" role="img" aria-labelledby="title desc">
<title id="title">PiBOH — Pietro Bonaldo, developer profile</title><desc id="desc">Animated terminal-style profile banner with an ASCII portrait, developer information and skills.</desc>
<defs>
